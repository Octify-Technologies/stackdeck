<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector / End of file</title>
<style>
  :root {
    --bg: #0e0e0e;
    --fg: #ededed;
    --cyan: #5cf2c8;
    --hair: #2a2a2a;
    --grotesk: 'Helvetica Neue', 'Arial', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--grotesk);
    -webkit-font-smoothing: antialiased;
  }
  .hair {
    position: absolute;
    left: 96px;
    right: 96px;
    height: 1px;
    background: var(--hair);
  }
  .hair.top { top: 96px; }
  .hair.bottom { bottom: 96px; }
  .ident {
    position: absolute;
    top: 128px;
    left: 96px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 0.18em;
  }
  .meta-tr {
    position: absolute;
    top: 128px;
    right: 96px;
    font-family: var(--mono);
    font-size: 13px;
    color: #6a6a6a;
    letter-spacing: 0.14em;
    text-align: right;
  }
  .title {
    position: absolute;
    left: 96px;
    top: 280px;
    font-size: 200px;
    line-height: 0.92;
    letter-spacing: -0.045em;
    font-weight: 600;
    color: var(--fg);
  }
  .title .dot { color: var(--cyan); }
  .prompt {
    position: absolute;
    left: 96px;
    top: 540px;
    font-family: var(--mono);
    font-size: 22px;
    color: var(--cyan);
    letter-spacing: 0.04em;
  }
  .prompt .caret {
    display: inline-block;
    width: 11px;
    height: 22px;
    background: var(--cyan);
    vertical-align: -3px;
    margin-left: 6px;
  }
  .sig {
    position: absolute;
    left: 96px;
    bottom: 152px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.9;
    color: #b8b8b8;
    letter-spacing: 0.06em;
  }
  .sig .k { color: #6a6a6a; }
  .footer-l {
    position: absolute;
    left: 96px;
    bottom: 64px;
    font-family: var(--mono);
    font-size: 12px;
    color: #6a6a6a;
    letter-spacing: 0.18em;
  }
  .footer-r {
    position: absolute;
    right: 96px;
    bottom: 64px;
    font-family: var(--mono);
    font-size: 12px;
    color: #6a6a6a;
    letter-spacing: 0.18em;
  }
  .dots {
    position: absolute;
    bottom: 130px;
    right: 96px;
    display: grid;
    grid-template-columns: repeat(12, 10px);
    grid-template-rows: repeat(3, 10px);
    gap: 12px;
  }
  .dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--cyan);
    align-self: center;
    justify-self: center;
  }
</style>
</head>
<body>
  <div class="hair top"></div>
  <div class="hair bottom"></div>

  <div class="ident">[ CASE &bull; 022 / EOF ]</div>
  <div class="meta-tr">VECTOR / 2026<br>OCTIFY TECHNOLOGIES</div>

  <h1 class="title">End of file<span class="dot">.</span></h1>

  <div class="prompt">$ octify --status complete<span class="caret"></span></div>

  <div class="sig">
    Octify Technologies<br>
    <span class="k">case-</span>022<br>
    2026.04.18<br>
    octifytechnologies.com
  </div>

  <div class="footer-l">PAGE 06 / 06</div>
  <div class="footer-r">CONFIDENTIAL</div>

  <div class="dots">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
</body>
</html>
