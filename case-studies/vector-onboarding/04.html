<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vector / The redesign</title>
<style>
  :root {
    --bg: #0e0e0e;
    --fg: #ededed;
    --cyan: #5cf2c8;
    --hair: #2a2a2a;
    --hair2: #3a3a3a;
    --grotesk: 'Helvetica Neue', 'Arial', sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--grotesk);
    -webkit-font-smoothing: antialiased;
  }
  .ident {
    position: absolute;
    top: 64px;
    left: 96px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 0.2em;
  }
  .pageno {
    position: absolute;
    top: 64px;
    right: 96px;
    font-family: var(--mono);
    font-size: 12px;
    color: #6a6a6a;
    letter-spacing: 0.2em;
  }
  h2 {
    position: absolute;
    top: 130px;
    left: 96px;
    margin: 0;
    font-size: 48px;
    letter-spacing: -0.03em;
    font-weight: 600;
    line-height: 1;
  }
  .sub {
    position: absolute;
    top: 196px;
    left: 96px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    color: #8a8a8a;
  }
  .stage {
    position: absolute;
    top: 320px;
    left: 96px;
    width: 1728px;
    height: 560px;
  }
  svg.diagram {
    position: absolute;
    top: 0;
    left: 0;
    width: 1728px;
    height: 560px;
    overflow: visible;
  }
  .footer {
    position: absolute;
    bottom: 36px;
    left: 96px;
    right: 96px;
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    color: #5a5a5a;
    letter-spacing: 0.18em;
  }
</style>
</head>
<body>
  <div class="ident">[ CASE &bull; 022 / 04 ]</div>
  <div class="pageno">04 / 06</div>

  <h2>Five steps. Three optional.</h2>
  <div class="sub">flow rebuild &bull; reduced fields, deferred friction, prefilled state</div>

  <div class="stage">
    <svg class="diagram" viewBox="0 0 1728 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .box { fill: #0e0e0e; stroke: #3a3a3a; stroke-width: 1; }
          .box-dash { fill: #0e0e0e; stroke: #3a3a3a; stroke-width: 1; stroke-dasharray: 4 4; }
          .label-num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; fill: #5cf2c8; letter-spacing: 0.18em; }
          .label-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; fill: #ededed; font-weight: 500; letter-spacing: -0.01em; }
          .label-meta { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; fill: #8a8a8a; letter-spacing: 0.04em; }
          .conn { stroke: #3a3a3a; stroke-width: 1; fill: none; }
          .conn-label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; fill: #8a8a8a; letter-spacing: 0.06em; }
          .anno { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; fill: #5cf2c8; letter-spacing: 0.08em; }
          .anno-line { stroke: #5cf2c8; stroke-width: 1; opacity: 0.55; }
          .opt { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; fill: #5a5a5a; letter-spacing: 0.18em; }
        </style>
      </defs>

      <!-- 5 boxes evenly spaced. Box w=200, h=120. Stage w=1728. Gap calc -->
      <!-- positions: x = 0, 382, 764, 1146, 1528 (gaps of 182) -->

      <!-- 01 Sign up -->
      <g transform="translate(0,220)">
        <rect class="box" x="0" y="0" width="200" height="120"/>
        <text class="label-num" x="16" y="26">01</text>
        <text class="opt" x="184" y="26" text-anchor="end">REQ</text>
        <text class="label-title" x="16" y="68">Sign up</text>
        <text class="label-meta" x="16" y="100">email + pwd</text>
      </g>

      <!-- 02 SSO -->
      <g transform="translate(382,220)">
        <rect class="box-dash" x="0" y="0" width="200" height="120"/>
        <text class="label-num" x="16" y="26">02</text>
        <text class="opt" x="184" y="26" text-anchor="end">OPT</text>
        <text class="label-title" x="16" y="68">SSO</text>
        <text class="label-meta" x="16" y="100">google, github</text>
      </g>

      <!-- 03 Workspace -->
      <g transform="translate(764,220)">
        <rect class="box" x="0" y="0" width="200" height="120"/>
        <text class="label-num" x="16" y="26">03</text>
        <text class="opt" x="184" y="26" text-anchor="end">REQ</text>
        <text class="label-title" x="16" y="68">Workspace</text>
        <text class="label-meta" x="16" y="100">name only</text>
      </g>

      <!-- 04 Sample data -->
      <g transform="translate(1146,220)">
        <rect class="box-dash" x="0" y="0" width="200" height="120"/>
        <text class="label-num" x="16" y="26">04</text>
        <text class="opt" x="184" y="26" text-anchor="end">OPT</text>
        <text class="label-title" x="16" y="68">Sample data</text>
        <text class="label-meta" x="16" y="100">prefilled</text>
      </g>

      <!-- 05 First action -->
      <g transform="translate(1528,220)">
        <rect class="box" x="0" y="0" width="200" height="120"/>
        <text class="label-num" x="16" y="26">05</text>
        <text class="opt" x="184" y="26" text-anchor="end">REQ</text>
        <text class="label-title" x="16" y="68">First action</text>
        <text class="label-meta" x="16" y="100">deploy / query</text>
      </g>

      <!-- Connectors at y = 280 (mid of box) -->
      <line class="conn" x1="200" y1="280" x2="382" y2="280"/>
      <line class="conn" x1="582" y1="280" x2="764" y2="280"/>
      <line class="conn" x1="964" y1="280" x2="1146" y2="280"/>
      <line class="conn" x1="1346" y1="280" x2="1528" y2="280"/>

      <!-- connector labels -->
      <text class="conn-label" x="291" y="270" text-anchor="middle">&lt; 200ms</text>
      <text class="conn-label" x="673" y="270" text-anchor="middle">optional</text>
      <text class="conn-label" x="1055" y="270" text-anchor="middle">auto-prefilled</text>
      <text class="conn-label" x="1437" y="270" text-anchor="middle">deferred</text>

      <!-- annotations: cyan, with leader lines -->

      <!-- top annotation on Sign up: removed 3 fields -->
      <g>
        <line class="anno-line" x1="100" y1="220" x2="100" y2="150"/>
        <text class="anno" x="100" y="138" text-anchor="middle">REMOVED 3 FIELDS</text>
      </g>

      <!-- top annotation on SSO -->
      <g>
        <line class="anno-line" x1="482" y1="220" x2="482" y2="180"/>
        <text class="anno" x="482" y="168" text-anchor="middle">NEW</text>
      </g>

      <!-- bottom annotation on Sample data -->
      <g>
        <line class="anno-line" x1="1246" y1="340" x2="1246" y2="400"/>
        <text class="anno" x="1246" y="418" text-anchor="middle">SEEDED PER ROLE</text>
      </g>

      <!-- bottom annotation on First action: deferred to step 4 (was step 1) -->
      <g>
        <line class="anno-line" x1="1628" y1="340" x2="1628" y2="400"/>
        <text class="anno" x="1628" y="418" text-anchor="middle">DEFERRED TO STEP 5</text>
      </g>

      <!-- bottom annotation on Sign up: 14 -> 4 fields -->
      <g>
        <line class="anno-line" x1="100" y1="340" x2="100" y2="400"/>
        <text class="anno" x="100" y="418" text-anchor="middle">14 &rarr; 4 INPUTS</text>
      </g>
    </svg>
  </div>

  <div class="footer">
    <span>VECTOR / Q1, Q2 2026</span>
    <span>THE REDESIGN</span>
    <span>OCTIFY TECHNOLOGIES</span>
  </div>
</body>
</html>
