<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thank you</title>
<style>
  :root {
    --bg: #0a0a0b;
    --ink: #f4f4f5;
    --muted: #a1a1aa;
    --accent: #e8b04b;
    --rule: #27272a;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', Arial, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: var(--bg); color: var(--ink); font-family: var(--sans); }
  .slide { position: relative; width: 1920px; height: 1080px; }

  .label { position: absolute; top: 76px; right: 96px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); }
  .label-l { position: absolute; top: 76px; left: 96px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); }

  .center { position: absolute; left: 0; right: 0; top: 360px; display: flex; flex-direction: column; align-items: center; }
  .brand-row { display: flex; align-items: center; gap: 16px; margin-bottom: 80px; }
  .brand-row .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); }
  .brand-row .name { font-family: var(--sans); font-size: 18px; letter-spacing: 0.04em; color: var(--ink); font-weight: 500; }

  .thanks { font-family: var(--serif); font-style: italic; font-size: 168px; letter-spacing: -0.03em; color: var(--ink); line-height: 1; margin: 0; font-weight: 400; }

  .contact { margin-top: 80px; display: flex; gap: 64px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
  .contact .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .contact .k { color: #52525b; font-size: 10px; letter-spacing: 0.3em; }
  .contact .v { color: var(--ink); font-size: 13px; letter-spacing: 0.1em; text-transform: none; font-family: var(--mono); }

  .numeral { position: absolute; right: 96px; bottom: 110px; font-family: var(--serif); font-style: italic; font-size: 220px; line-height: 1; color: rgba(232, 176, 75, 0.18); letter-spacing: -0.04em; }

  .rule { position: absolute; left: 96px; right: 96px; bottom: 96px; height: 1px; background: var(--rule); }
  .footnote { position: absolute; left: 96px; bottom: 64px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #52525b; }
  .footnote-r { position: absolute; right: 96px; bottom: 64px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #52525b; }
</style>
</head>
<body>
  <div class="slide">
    <div class="label-l">End / Case Study No. 014</div>
    <div class="label">Fin.</div>

    <div class="center">
      <div class="brand-row">
        <span class="dot"></span>
        <span class="name">Octify Technologies</span>
      </div>
      <p class="thanks">Thank you.</p>
      <div class="contact">
        <div class="item"><span class="k">Email</span><span class="v">ankur@octify.tech</span></div>
        <div class="item"><span class="k">Web</span><span class="v">octify.tech</span></div>
        <div class="item"><span class="k">Author</span><span class="v">Octify Studio, 2026</span></div>
      </div>
    </div>

    <div class="numeral">07</div>
    <div class="rule"></div>
    <div class="footnote">Octify Technologies / Confidential</div>
    <div class="footnote-r">07 / 07</div>
  </div>
</body>
</html>
